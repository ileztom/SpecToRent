services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spectorrent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spectorrent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: spectorrent
      PGUSER: postgres
      PGPASSWORD: admin
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - uploads_data:/uploads:ro

volumes:
  postgres_data:
  uploads_data:
